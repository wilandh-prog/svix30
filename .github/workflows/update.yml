name: Update SVIX30

on:
  schedule:
    # 16:45 UTC = 17:45 Stockholm in winter, 18:45 in summer — both safely
    # after the close files (published ~17:39 local) are available.
    - cron: "45 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-svix30

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Stockholm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python update_index.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily SVIX30 update"
            git push
          fi
