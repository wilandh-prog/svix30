name: Update SVIX30

on:
  schedule:
    # 16:45 UTC = 17:45 Stockholm in winter, 18:45 in summer — both safely
    # after the close files (published ~17:39 local) are available.
    - cron: "45 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-svix30

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Stockholm
      # true only once the bokakul publishing token has been added as a secret
      HAS_BOKAKUL: ${{ secrets.BOKAKUL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python update_index.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily SVIX30 update"
            git push
          fi

      # Publish the self-contained page to bokakul.se/optionsindex. Requires a
      # fine-grained PAT (repo: bokakul, Contents: read+write) in secret BOKAKUL_TOKEN.
      - name: Check out bokakul
        if: env.HAS_BOKAKUL == 'true'
        uses: actions/checkout@v4
        with:
          repository: wilandh-prog/bokakul
          token: ${{ secrets.BOKAKUL_TOKEN }}
          path: bokakul

      - name: Publish to bokakul/optionsindex
        if: env.HAS_BOKAKUL == 'true'
        run: |
          mkdir -p bokakul/optionsindex
          cp docs/index.html bokakul/optionsindex/index.html
          cd bokakul
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optionsindex/index.html
          if git diff --cached --quiet; then
            echo "No changes to publish to bokakul"
          else
            git commit -m "Update options index from svix30"
            git push
          fi
